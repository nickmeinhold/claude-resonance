<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Resonance — Live Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 14px;
    padding: 24px;
    min-height: 100vh;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  h1 span { color: var(--accent); }

  .status {
    font-size: 12px;
    color: var(--text-dim);
  }

  .status .live {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--surface);
    border-radius: 2px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .progress-bar .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--purple));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  @media (max-width: 1200px) {
    .grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .panel h2 {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  /* MAP-Elites heatmap */
  .heatmap {
    display: grid;
    grid-template-columns: auto repeat(3, 1fr);
    gap: 3px;
    font-size: 11px;
  }

  .heatmap .label {
    display: flex;
    align-items: center;
    padding: 4px 8px;
    color: var(--text-dim);
    font-size: 10px;
    white-space: nowrap;
  }

  .heatmap .col-label {
    text-align: center;
    padding: 4px;
    color: var(--text-dim);
    font-size: 10px;
  }

  .heatmap .cell {
    aspect-ratio: 2;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    font-weight: 600;
    font-size: 13px;
    min-height: 36px;
  }

  .heatmap .cell:hover {
    transform: scale(1.08);
    box-shadow: 0 0 12px rgba(88, 166, 255, 0.3);
    z-index: 1;
  }

  .heatmap .cell.empty {
    background: rgba(255, 255, 255, 0.03);
    border: 1px dashed var(--border);
    color: var(--text-dim);
    font-size: 10px;
    font-weight: 400;
  }

  /* Score trend chart */
  .chart-container {
    position: relative;
    width: 100%;
    height: 200px;
  }

  canvas { width: 100% !important; height: 100% !important; }

  /* Dimension radar */
  .radar-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 240px;
  }

  /* History log */
  .log {
    max-height: 300px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.8;
  }

  .log .entry {
    display: flex;
    gap: 12px;
    padding: 4px 0;
    border-bottom: 1px solid rgba(48, 54, 61, 0.5);
  }

  .log .gen { color: var(--accent); min-width: 50px; }
  .log .score { min-width: 45px; font-weight: 600; }
  .log .badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 500;
  }
  .log .badge.inserted { background: rgba(63, 185, 80, 0.15); color: var(--green); }
  .log .badge.rejected { background: rgba(248, 81, 73, 0.15); color: var(--red); }
  .log .operator { color: var(--purple); font-size: 11px; }
  .log .hypothesis { color: var(--text-dim); font-size: 11px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 24px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    min-width: 140px;
  }

  .stat .value {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.2;
  }

  .stat .label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Detail modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    max-width: 700px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal h3 {
    font-size: 16px;
    margin-bottom: 4px;
  }

  .modal .meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .modal .prompt {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    max-height: 300px;
    overflow-y: auto;
  }

  .modal .dim-bars {
    margin-top: 16px;
  }

  .modal .dim-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 12px;
  }

  .modal .dim-bar .dim-name {
    width: 160px;
    color: var(--text-dim);
  }

  .modal .dim-bar .bar-bg {
    flex: 1;
    height: 12px;
    background: var(--bg);
    border-radius: 3px;
    overflow: hidden;
  }

  .modal .dim-bar .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }

  .modal .dim-bar .dim-val {
    width: 30px;
    text-align: right;
    font-weight: 600;
  }

  .close-btn {
    float: right;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
  }

  .close-btn:hover { color: var(--text); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1><span>Claude</span> Resonance</h1>
  <div class="status" id="status">
    <span class="live"></span>
    Loading...
  </div>
</header>

<div class="progress-bar"><div class="fill" id="progress-fill"></div></div>

<div class="stats" id="stats"></div>

<div class="grid">
  <div class="panel">
    <h2>MAP-Elites Archive</h2>
    <div class="heatmap" id="heatmap"></div>
  </div>

  <div class="panel">
    <h2>Score Trend</h2>
    <div class="chart-container">
      <canvas id="trend-chart"></canvas>
    </div>
  </div>

  <div class="panel">
    <h2>Best Variant — Dimensions</h2>
    <div class="radar-container">
      <canvas id="radar-chart" width="240" height="240"></canvas>
    </div>
  </div>

  <div class="panel">
    <h2>Event Log</h2>
    <div class="log" id="log"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
const DATA_URL = 'data/experiments/dashboard_state.json';
const POLL_INTERVAL = 5000;
const STRATEGIES = ['persona','metacognitive','constraint','minimalist','socratic','adversarial','emotional','domainTransfer'];
const LENGTH_BINS = ['short_','medium','long_'];
const STRATEGY_LABELS = {
  persona: 'Persona', metacognitive: 'Metacognitive', constraint: 'Constraint',
  minimalist: 'Minimalist', socratic: 'Socratic', adversarial: 'Adversarial',
  emotional: 'Emotional', domainTransfer: 'Domain Transfer'
};
const LENGTH_LABELS = { short_: 'Short', medium: 'Medium', long_: 'Long' };

let lastData = null;
let trendCtx = null;

function scoreColor(score) {
  if (score >= 4.0) return 'rgba(63, 185, 80, 0.7)';
  if (score >= 3.5) return 'rgba(63, 185, 80, 0.45)';
  if (score >= 3.0) return 'rgba(210, 153, 34, 0.5)';
  if (score >= 2.5) return 'rgba(210, 153, 34, 0.35)';
  return 'rgba(248, 81, 73, 0.4)';
}

function scoreColorSolid(score) {
  if (score >= 4.0) return '#3fb950';
  if (score >= 3.5) return '#56d364';
  if (score >= 3.0) return '#d29922';
  if (score >= 2.5) return '#e3b341';
  return '#f85149';
}

function renderStats(data) {
  const best = data.archive.cells.reduce((a, b) => (a && a.score > b.score) ? a : b, null);
  const avgScore = data.archive.cells.length > 0
    ? (data.archive.cells.reduce((s, c) => s + c.score, 0) / data.archive.cells.length).toFixed(2)
    : '—';

  document.getElementById('stats').innerHTML = `
    <div class="stat">
      <div class="value">${data.currentGeneration} / ${data.totalGenerations}</div>
      <div class="label">Generation</div>
    </div>
    <div class="stat">
      <div class="value">${data.archive.occupiedCells} / ${data.archive.totalCells}</div>
      <div class="label">Archive Fill</div>
    </div>
    <div class="stat">
      <div class="value" style="color: ${best ? scoreColorSolid(best.score) : 'inherit'}">${best ? best.score.toFixed(2) : '—'}</div>
      <div class="label">Best Score</div>
    </div>
    <div class="stat">
      <div class="value">${avgScore}</div>
      <div class="label">Avg Archive Score</div>
    </div>
    <div class="stat">
      <div class="value">${data.history.length}</div>
      <div class="label">Total Variants</div>
    </div>
  `;
}

function renderHeatmap(data) {
  const cellMap = {};
  for (const cell of data.archive.cells) {
    cellMap[`${cell.strategy}_${cell.lengthBin}`] = cell;
  }

  let html = '<div class="label"></div>';
  for (const lb of LENGTH_BINS) {
    html += `<div class="col-label">${LENGTH_LABELS[lb]}</div>`;
  }

  for (const strategy of STRATEGIES) {
    html += `<div class="label">${STRATEGY_LABELS[strategy]}</div>`;
    for (const lb of LENGTH_BINS) {
      const cell = cellMap[`${strategy}_${lb}`];
      if (cell) {
        html += `<div class="cell" style="background: ${scoreColor(cell.score)}"
          onclick='showCellDetail(${JSON.stringify(cell).replace(/'/g, "&#39;")})'
          title="${STRATEGY_LABELS[strategy]} × ${LENGTH_LABELS[lb]}: ${cell.score.toFixed(2)}">
          ${cell.score.toFixed(1)}
        </div>`;
      } else {
        html += `<div class="cell empty">—</div>`;
      }
    }
  }

  document.getElementById('heatmap').innerHTML = html;
}

function renderTrendChart(data) {
  const canvas = document.getElementById('trend-chart');
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  const w = rect.width;
  const h = rect.height;

  ctx.clearRect(0, 0, w, h);

  if (data.history.length === 0) return;

  const scores = data.history.map(e => e.score);
  const minScore = Math.min(...scores, 1);
  const maxScore = Math.max(...scores, 5);
  const range = maxScore - minScore || 1;

  const pad = { top: 20, right: 20, bottom: 30, left: 40 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;

  // Axes
  ctx.strokeStyle = '#30363d';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top);
  ctx.lineTo(pad.left, h - pad.bottom);
  ctx.lineTo(w - pad.right, h - pad.bottom);
  ctx.stroke();

  // Y-axis labels
  ctx.fillStyle = '#8b949e';
  ctx.font = '10px monospace';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const val = minScore + (range * i / 4);
    const y = h - pad.bottom - (ch * i / 4);
    ctx.fillText(val.toFixed(1), pad.left - 6, y + 3);
    if (i > 0) {
      ctx.strokeStyle = 'rgba(48, 54, 61, 0.5)';
      ctx.beginPath();
      ctx.moveTo(pad.left, y);
      ctx.lineTo(w - pad.right, y);
      ctx.stroke();
    }
  }

  // Compute running best
  const runningBest = [];
  let best = 0;
  for (const s of scores) {
    best = Math.max(best, s);
    runningBest.push(best);
  }

  const xStep = scores.length > 1 ? cw / (scores.length - 1) : cw / 2;

  // Running best line (filled area)
  ctx.beginPath();
  ctx.fillStyle = 'rgba(88, 166, 255, 0.08)';
  ctx.moveTo(pad.left, h - pad.bottom);
  for (let i = 0; i < runningBest.length; i++) {
    const x = pad.left + i * xStep;
    const y = h - pad.bottom - ((runningBest[i] - minScore) / range) * ch;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(pad.left + (runningBest.length - 1) * xStep, h - pad.bottom);
  ctx.closePath();
  ctx.fill();

  // Running best line
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(88, 166, 255, 0.4)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < runningBest.length; i++) {
    const x = pad.left + i * xStep;
    const y = h - pad.bottom - ((runningBest[i] - minScore) / range) * ch;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Individual points
  for (let i = 0; i < scores.length; i++) {
    const x = pad.left + i * xStep;
    const y = h - pad.bottom - ((scores[i] - minScore) / range) * ch;
    const entry = data.history[i];

    ctx.beginPath();
    ctx.fillStyle = entry.inserted ? '#3fb950' : '#f85149';
    ctx.arc(x, y, 3.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Legend
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#3fb950';
  ctx.fillRect(w - pad.right - 120, pad.top, 8, 8);
  ctx.fillStyle = '#8b949e';
  ctx.fillText('Inserted', w - pad.right - 108, pad.top + 8);
  ctx.fillStyle = '#f85149';
  ctx.fillRect(w - pad.right - 120, pad.top + 14, 8, 8);
  ctx.fillStyle = '#8b949e';
  ctx.fillText('Rejected', w - pad.right - 108, pad.top + 22);
}

function renderRadarChart(data) {
  const canvas = document.getElementById('radar-chart');
  const ctx = canvas.getContext('2d');
  const size = 240;
  canvas.width = size * window.devicePixelRatio;
  canvas.height = size * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx.clearRect(0, 0, size, size);

  const best = data.archive.cells.reduce((a, b) => (a && a.score > b.score) ? a : b, null);
  if (!best || !best.dimensions) return;

  const dims = Object.entries(best.dimensions);
  const n = dims.length;
  if (n === 0) return;

  const cx = size / 2;
  const cy = size / 2;
  const r = 85;
  const angleStep = (Math.PI * 2) / n;

  // Grid rings
  for (let ring = 1; ring <= 5; ring++) {
    const rr = (r * ring) / 5;
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(48, 54, 61, 0.6)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= n; i++) {
      const angle = i * angleStep - Math.PI / 2;
      const x = cx + Math.cos(angle) * rr;
      const y = cy + Math.sin(angle) * rr;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Spokes
  for (let i = 0; i < n; i++) {
    const angle = i * angleStep - Math.PI / 2;
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(48, 54, 61, 0.4)';
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
    ctx.stroke();
  }

  // Data polygon
  ctx.beginPath();
  ctx.fillStyle = 'rgba(188, 140, 255, 0.15)';
  ctx.strokeStyle = '#bc8cff';
  ctx.lineWidth = 2;
  for (let i = 0; i <= n; i++) {
    const idx = i % n;
    const val = dims[idx][1];
    const angle = idx * angleStep - Math.PI / 2;
    const rr = (r * val) / 5;
    const x = cx + Math.cos(angle) * rr;
    const y = cy + Math.sin(angle) * rr;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.fill();
  ctx.stroke();

  // Labels
  ctx.fillStyle = '#e6edf3';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  const shortLabels = {
    'Specificity': 'Specific.',
    'Novel Connections': 'Novel',
    'Unprompted Exploration': 'Explore',
    'Genuine Caveats': 'Caveats',
    'Technical Depth': 'Depth',
    'Voice': 'Voice',
  };
  for (let i = 0; i < n; i++) {
    const angle = i * angleStep - Math.PI / 2;
    const labelR = r + 18;
    const x = cx + Math.cos(angle) * labelR;
    const y = cy + Math.sin(angle) * labelR;
    const label = shortLabels[dims[i][0]] || dims[i][0];
    ctx.fillText(label, x, y + 4);

    // Value next to label
    ctx.fillStyle = '#8b949e';
    ctx.fillText(dims[i][1].toFixed(1), x, y + 16);
    ctx.fillStyle = '#e6edf3';
  }
}

function renderLog(data) {
  const log = document.getElementById('log');
  let html = '';
  // Show newest first
  const entries = [...data.history].reverse();
  for (const entry of entries) {
    const badgeClass = entry.inserted ? 'inserted' : 'rejected';
    const badgeText = entry.inserted ? 'IN' : 'REJ';
    const op = entry.operator || 'seed';
    const hyp = entry.hypothesis || '';
    html += `
      <div class="entry">
        <span class="gen">gen ${entry.generation}</span>
        <span class="score" style="color: ${scoreColorSolid(entry.score)}">${entry.score.toFixed(2)}</span>
        <span class="badge ${badgeClass}">${badgeText}</span>
        <span class="operator">${op}</span>
        <span class="hypothesis" title="${hyp.replace(/"/g, '&quot;')}">${hyp}</span>
      </div>
    `;
  }
  log.innerHTML = html;
}

function showCellDetail(cell) {
  const modal = document.getElementById('modal');
  const dims = cell.dimensions ? Object.entries(cell.dimensions) : [];
  const dimBars = dims.map(([name, val]) => {
    const pct = (val / 5) * 100;
    return `
      <div class="dim-bar">
        <span class="dim-name">${name}</span>
        <div class="bar-bg"><div class="bar-fill" style="width: ${pct}%; background: ${scoreColorSolid(val)}"></div></div>
        <span class="dim-val">${val.toFixed(1)}</span>
      </div>
    `;
  }).join('');

  modal.innerHTML = `
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <h3>${STRATEGY_LABELS[cell.strategy] || cell.strategy} &times; ${LENGTH_LABELS[cell.lengthBin] || cell.lengthBin}</h3>
    <div class="meta">
      Score: <strong>${cell.score.toFixed(2)}</strong>
      &middot; Gen ${cell.generation}
      &middot; ${cell.operator || 'seed'}
    </div>
    ${cell.hypothesis ? `<p style="margin-bottom: 12px; color: var(--text-dim); font-size: 12px;"><em>${cell.hypothesis}</em></p>` : ''}
    <div class="dim-bars">${dimBars}</div>
    <h2 style="margin-top: 16px; font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;">System Prompt</h2>
    <div class="prompt">${escapeHtml(cell.systemPrompt)}</div>
  `;

  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function fetchData() {
  try {
    const resp = await fetch(DATA_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return await resp.json();
  } catch (e) {
    return null;
  }
}

async function update() {
  const data = await fetchData();
  if (!data) {
    document.getElementById('status').innerHTML =
      '<span class="live" style="background: var(--orange)"></span> Waiting for data...';
    return;
  }

  lastData = data;

  const isComplete = data.currentGeneration >= data.totalGenerations;
  const pct = ((data.currentGeneration / data.totalGenerations) * 100).toFixed(0);
  document.getElementById('progress-fill').style.width = pct + '%';

  const updatedAt = new Date(data.updatedAt);
  const ago = Math.round((Date.now() - updatedAt.getTime()) / 1000);
  const agoText = ago < 60 ? `${ago}s ago` : `${Math.round(ago / 60)}m ago`;
  document.getElementById('status').innerHTML = isComplete
    ? `<span class="live" style="background: var(--accent); animation: none"></span> Complete &middot; Updated ${agoText}`
    : `<span class="live"></span> Gen ${data.currentGeneration}/${data.totalGenerations} &middot; Updated ${agoText}`;

  renderStats(data);
  renderHeatmap(data);
  renderTrendChart(data);
  renderRadarChart(data);
  renderLog(data);
}

// Initial load + polling
update();
setInterval(update, POLL_INTERVAL);
</script>
</body>
</html>
